<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="55%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#06070a"/>
    </linearGradient>

    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#92ebff"/>
    </marker>

    <style>
      .title { font: 700 54px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 24px 'Segoe UI', Arial, sans-serif; fill: #c8d7e6; }
      .section { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .label { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #eaf4fb; }
      .small { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #9fb3c6; }
      .mono { font: 600 18px Consolas, Menlo, monospace; fill: #d8fbff; }
      .core { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #f7fff8; }
      .tag { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #08121c; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.10" stroke="#9fdcff" stroke-width="1">
    <line x1="0" y1="100" x2="1600" y2="100"/><line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/><line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/><line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="700" x2="1600" y2="700"/><line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="100" y1="0" x2="100" y2="900"/><line x1="220" y1="0" x2="220" y2="900"/>
    <line x1="340" y1="0" x2="340" y2="900"/><line x1="460" y1="0" x2="460" y2="900"/>
    <line x1="580" y1="0" x2="580" y2="900"/><line x1="700" y1="0" x2="700" y2="900"/>
    <line x1="820" y1="0" x2="820" y2="900"/><line x1="940" y1="0" x2="940" y2="900"/>
    <line x1="1060" y1="0" x2="1060" y2="900"/><line x1="1180" y1="0" x2="1180" y2="900"/>
    <line x1="1300" y1="0" x2="1300" y2="900"/><line x1="1420" y1="0" x2="1420" y2="900"/>
    <line x1="1540" y1="0" x2="1540" y2="900"/>
  </g>

  <text x="90" y="88" class="title">From Packet Gap to Throughput Collapse</text>
  <text x="90" y="128" class="subtitle">A causal chain from packet-level timing to system-level behavior</text>

  <!-- 4-stage chain -->
  <g transform="translate(80,190)">
    <!-- stage 1 -->
    <rect x="0" y="0" width="320" height="220" rx="24" fill="none" stroke="#1d3553" stroke-width="1.6"/>
    <rect x="24" y="20" width="54" height="28" rx="12" fill="#45ffd0" filter="url(#glowGreen)"/>
    <text x="43" y="40" class="tag">①</text>
    <text x="98" y="42" class="section">Packet Gap Event</text>
    <text x="28" y="76" class="small">A large inter-packet delay appears in packet-level decoding.</text>

    <text x="30" y="118" class="mono">Δt ≈ 303 ms</text>
    <text x="30" y="148" class="mono">(8.36s → 8.66s)</text>

    <rect x="28" y="168" width="260" height="30" rx="8" fill="none" stroke="#45ffd0" stroke-width="2.2" filter="url(#glowGreen)"/>
    <text x="45" y="188" class="small">Δt ≫ Δt_serialization</text>

    <!-- tiny packet train -->
    <g transform="translate(175,92)">
      <rect x="0" y="0" width="34" height="16" rx="4" fill="#45ffd0" filter="url(#glowGreen)"/>
      <rect x="56" y="0" width="34" height="16" rx="4" fill="#45ffd0" filter="url(#glowGreen)"/>
      <rect x="170" y="0" width="34" height="16" rx="4" fill="#45ffd0" filter="url(#glowGreen)"/>
      <text x="101" y="14" class="small">gap</text>
    </g>

    <!-- stage 2 -->
    <rect x="400" y="0" width="320" height="220" rx="24" fill="none" stroke="#1d3553" stroke-width="1.6"/>
    <rect x="424" y="20" width="54" height="28" rx="12" fill="#7de9ff" filter="url(#glowCyan)"/>
    <text x="443" y="40" class="tag">②</text>
    <text x="498" y="42" class="section">Packet Train Break</text>
    <text x="428" y="76" class="small">Continuity is broken: the next packet does not arrive on time.</text>

    <g transform="translate(430,118)">
      <rect x="0" y="0" width="48" height="18" rx="4" fill="#7de9ff" filter="url(#glowCyan)"/>
      <rect x="78" y="0" width="48" height="18" rx="4" fill="#7de9ff" filter="url(#glowCyan)"/>
      <rect x="282" y="0" width="48" height="18" rx="4" fill="#7de9ff" filter="url(#glowCyan)"/>
      <text x="152" y="14" class="mono">gap</text>
    </g>

    <text x="430" y="184" class="label">Serialization delay stays fixed.</text>
    <text x="430" y="208" class="small">What changes is time continuity.</text>

    <!-- stage 3 -->
    <rect x="800" y="0" width="320" height="220" rx="24" fill="none" stroke="#1d3553" stroke-width="1.6"/>
    <rect x="824" y="20" width="54" height="28" rx="12" fill="#ffb347" filter="url(#glowOrange)"/>
    <text x="843" y="40" class="tag">③</text>
    <text x="898" y="42" class="section">ACK Clock Fragmentation</text>
    <text x="828" y="76" class="small">The gap interrupts timing feedback from ACK-driven transmission.</text>

    <text x="830" y="122" class="mono">packet gap</text>
    <text x="925" y="122" class="mono">→</text>
    <text x="960" y="122" class="mono">ACK clock break</text>

    <text x="830" y="168" class="label">Sending is no longer rhythmically paced.</text>
    <text x="830" y="194" class="small">The feedback loop is fragmented in time.</text>

    <!-- stage 4 -->
    <rect x="1200" y="0" width="320" height="220" rx="24" fill="none" stroke="#1d3553" stroke-width="1.6"/>
    <rect x="1224" y="20" width="54" height="28" rx="12" fill="#ff6f91" filter="url(#glowRed)"/>
    <text x="1243" y="40" class="tag">④</text>
    <text x="1298" y="42" class="section">Throughput Collapse</text>
    <text x="1228" y="76" class="small">System-level outcome: throughput visibly falls in the corresponding region.</text>

    <g transform="translate(1230,114)">
      <polyline points="0,8 32,6 64,8 96,18 128,34 160,50 192,64 224,76"
                fill="none" stroke="#ff8b62" stroke-width="4" filter="url(#glowOrange)"/>
    </g>
    <text x="1230" y="192" class="label">~10 Mbps → &lt; 2 Mbps</text>

    <!-- arrows between boxes -->
    <line x1="320" y1="110" x2="400" y2="110" stroke="#8fe9ff" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="720" y1="110" x2="800" y2="110" stroke="#8fe9ff" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="1120" y1="110" x2="1200" y2="110" stroke="#8fe9ff" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <!-- lower synthesis -->
  <g transform="translate(80,500)">
    <rect x="0" y="0" width="1440" height="280" rx="24" fill="none" stroke="#1d3553" stroke-width="1.6"/>
    <text x="34" y="44" class="section">Unified interpretation</text>

    <text x="36" y="88" class="core">Throughput collapse is not caused by slower transmission.</text>
    <text x="36" y="126" class="core">It is caused by the emergence of packet gaps in time.</text>

    <text x="36" y="182" class="label">Physical layer reality:</text>
    <text x="248" y="182" class="mono">Δt_serialization = constant</text>

    <text x="36" y="220" class="label">Behavioral layer reality:</text>
    <text x="248" y="220" class="mono">Δt_actual can become much larger due to gaps</text>

    <text x="36" y="258" class="label">System outcome:</text>
    <text x="248" y="258" class="mono">lower packet density over time → lower throughput</text>

    <!-- right-side compact flow -->
    <g transform="translate(900,86)">
      <rect x="0" y="0" width="440" height="150" rx="18" fill="none" stroke="#284b73" stroke-width="1.5"/>
      <text x="26" y="34" class="mono">Δt ≫ Δt_serialization</text>
      <text x="26" y="68" class="mono">→ packet gap</text>
      <text x="26" y="102" class="mono">→ ACK clock fragmentation</text>
      <text x="26" y="136" class="mono">→ throughput collapse</text>
    </g>
  </g>

  <text x="90" y="850" class="subtitle">Lab02 Core Claim</text>
  <text x="90" y="888" class="core">Serialization is fixed. Throughput depends on continuity.</text>
</svg>
